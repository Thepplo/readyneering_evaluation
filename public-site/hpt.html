<body>

  <div id="scr-intro" class="screen active">
    <h1>Highest Performing Teams — Self-Evaluation</h1>
    <p>28 statements about how your team operates. Rate each from 1 (Never) to 5 (Always).</p>
    <p>~5 minutes. Five quotients: Vitality, Emotion, Mind, Execution, Alignment.</p>
    <div class="nav">
      <span></span>
      <button id="btn-start">Begin</button>
    </div>
  </div>

  <div id="scr-quotient" class="screen">
    <div class="progress" id="progress"></div>
    <h2 id="quotient-title"></h2>
    <div id="questions-container"></div>
    <div class="err" id="quotient-err" hidden></div>
    <div class="nav">
      <button id="btn-back">Back</button>
      <button id="btn-next">Next</button>
    </div>
  </div>

  <div id="scr-loading" class="screen">
    <h2>Calculating your team profile…</h2>
    <p id="loading-msg">Saving your responses.</p>
  </div>

  <div id="scr-results" class="screen">
    <h1>Your Team Profile</h1>
    <div id="results-summary"></div>
    <h3>Raw report (debug)</h3>
    <pre id="results-debug"></pre>
  </div>

<script src="assets/hpt.js"></script>
</body>
