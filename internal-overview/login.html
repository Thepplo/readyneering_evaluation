<!DOCTYPE html>
   <html lang="en">
   <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Sign in — andQFIVE Facilitator</title>
     <link rel="stylesheet" href="/assets/qstyles.css">
   </head>
   <body>
     <div class="bg">
       <div class="login-container">
         <h1>Facilitator sign-in</h1>
         <p>Enter your andQFIVE email. We'll send you a one-click sign-in link.</p>
         <form id="login-form">
           <input type="email" id="email" placeholder="Your andQFIVE email" required>
           <button type="submit">Send sign-in link</button>
         </form>
         <div id="login-message"></div>
       </div>
     </div>
     <script type="module" src="/assets/login.js"></script>
   </body>
   </html>
